spring:
  application:
    name: libris
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:libris}
    username: ${DB_USER:libris}
    password: ${DB_PASSWORD:libris_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    locations: classpath:db/migration
  messages:
    basename: i18n/messages
    encoding: UTF-8
  web:
    locale: zh_CN
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  servlet:
    session:
      timeout: 4h
      cookie:
        name: LIBRIS_SESSION
        http-only: true
        same-site: lax
        secure: ${COOKIE_SECURE:false}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-message: never
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Mail is a best-effort notification channel; a down SMTP relay (e.g. running
    # the backend without MailHog) must not drag the whole app to DOWN.
    mail:
      enabled: false

springdoc:
  api-docs:
    enabled: ${API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${API_DOCS_ENABLED:true}
    path: /swagger-ui.html

libris:
  security:
    login:
      max-attempts: 5
      lockout-minutes: 15

logging:
  level:
    com.libris: INFO
