# One-command full stack:  docker compose up --build
# App:      http://localhost:8081      (nginx → SPA + /api proxy)
# API only: http://localhost:8080      (Spring Boot, dev profile)
# MailHog:  http://localhost:8025      (captured notification emails)
services:
  postgres:
    image: postgres:16-alpine
    container_name: libris-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-libris}
      POSTGRES_USER: ${DB_USER:-libris}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-libris_dev}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - libris-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-libris} -d ${DB_NAME:-libris}']
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: libris-mailhog
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

  backend:
    build: ./backend
    container_name: libris-backend
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-libris}
      DB_USER: ${DB_USER:-libris}
      DB_PASSWORD: ${DB_PASSWORD:-libris_dev}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: libris-frontend
    ports:
      - '8081:80'
    depends_on:
      - backend

volumes:
  libris-pgdata:
